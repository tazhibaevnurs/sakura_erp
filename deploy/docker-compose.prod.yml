services:
  web:
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "False"

  daphne:
    restart: unless-stopped

  nginx:
    restart: unless-stopped

  celery:
    restart: unless-stopped

  celery-beat:
    restart: unless-stopped
    volumes:
      - celerybeat_data:/app/celerybeat

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

volumes:
  celerybeat_data:
