# Локальная разработка в Docker (опционально).
# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  web:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "True"
      RUN_BOOTSTRAP: "1"
      CREATE_SUPERUSER: "1"
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  daphne:
    volumes:
      - ..:/app
    ports:
      - "8001:8001"

  nginx:
    ports:
      - "8080:80"

  celery:
    volumes:
      - ..:/app

  celery-beat:
    volumes:
      - ..:/app
