{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Блюдо — Сакура{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="panel">
      <div class="panel-header">{% if object %}Редактирование{% else %}Новое блюдо{% endif %}</div>
      <div class="panel-body">
        <form method="post">{% csrf_token %}{{ form|crispy }}
          <button class="btn btn-sakura w-100">Сохранить</button>
          <a href="{% url 'menu:manage' %}" class="btn btn-link w-100">К меню</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
