{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Вход — Сакура{% endblock %}
{% block content %}
<div class="w-100 d-flex justify-content-center px-3">
  <div class="card login-card">
    <div class="card-body">
      <div class="login-brand">
        <div class="brand-icon">🌸</div>
        <h1 class="h4 fw-bold mb-1">Сакура</h1>
        <p class="text-muted small mb-0">Система управления чайханой</p>
      </div>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-sakura w-100 mt-2 py-2">Войти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
