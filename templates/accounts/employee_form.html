{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Сотрудник — Сакура{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="panel">
      <div class="panel-header">Новый сотрудник</div>
      <div class="panel-body">
        <form method="post">{% csrf_token %}{{ form|crispy }}
          <button class="btn btn-sakura w-100">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
