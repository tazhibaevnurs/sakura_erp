{% extends "base.html" %}
{% block title %}База знаний ассистента — Сакура{% endblock %}
{% block content %}
<div class="page-header d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
  <div>
    <h1>База знаний ИИ</h1>
    <p class="page-subtitle mb-0">Всё, что ассистент передаёт в контекст при каждом ответе</p>
  </div>
  <a href="{% url 'assistant:settings' %}" class="btn btn-sakura-outline btn-sm">
    <i class="bi bi-arrow-left"></i> Настройки
  </a>
</div>

<div class="panel">
  <div class="panel-header d-flex justify-content-between align-items-center">
    <span><i class="bi bi-database me-2"></i>Контекст (обновляется при каждом запросе)</span>
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="navigator.clipboard.writeText(document.getElementById('knowledge-text').innerText)">
      Копировать
    </button>
  </div>
  <div class="panel-body">
    <pre id="knowledge-text" class="assistant-knowledge-pre mb-0">{{ knowledge }}</pre>
  </div>
</div>
{% endblock %}
