{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Отмена заказа — Сакура{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="panel">
      <div class="panel-header text-danger"><i class="bi bi-x-circle me-2"></i>Отмена заказа #{{ order.pk }}</div>
      <div class="panel-body">
        <form method="post">{% csrf_token %}{{ form|crispy }}
          <button type="submit" class="btn btn-danger w-100">Отменить заказ</button>
          <a href="{% url 'orders:detail' order.pk %}" class="btn btn-outline-secondary w-100 mt-2">Назад</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
